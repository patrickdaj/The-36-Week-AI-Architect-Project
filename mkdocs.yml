site_name: The 36-Week AI Architect Project
site_description: From blasting Copilot prompts to architecting AI systems — a free, build-first curriculum for engineers.
site_url: https://patrickdaj.github.io/The-36-Week-AI-Architect-Project/

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: README.md
  - How to Use: how-to-use.md
  - Equipment Guide: equipment-guide.md

  - "Unit 1 — Prompt Engineering":
    - blocks/01-prompt-engineering/README.md
